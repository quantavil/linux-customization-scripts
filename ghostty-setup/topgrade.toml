[misc]
pre_sudo = true                 # cache sudo once, then walk away
cleanup = true                  # trim old cached packages after upgrade
no_retry = true
notify_end = "on_failure"
# tune this list after running `topgrade --list-steps`:
disable = ["firmware", "snap", "containers"]

[linux]
arch_package_manager = "paru"   # repo + AUR in one transaction
yay_arguments = "--nodevel"     # <-- stops constant -git rebuilds
show_arch_news = true           # prints Arch news before upgrading

[flatpak]
use_sudo = true

[commands]
# non-interactive reminder; if it lists files, run `sudo pacdiff` after
"Check for .pacnew files" = "pacdiff -o"

# Preserved interactive script macros
"bun" = "curl -fsSL https://bun.sh/install | bash"
"pls" = "curl -sSfL https://raw.githubusercontent.com/colus001/pls/main/install.sh | sh"
"fahhh" = "curl -fsSL https://raw.githubusercontent.com/0xN1nja/fahhh/master/install.sh | bash"
